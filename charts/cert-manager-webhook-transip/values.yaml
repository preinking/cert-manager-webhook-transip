# The GroupName here is used to identify your company or business unit that
# created this webhook.
# For example, this may be "acme.mycompany.com".
# This name will need to be referenced in each Issuer's `webhook` stanza to
# inform cert-manager of where to send ChallengePayload resources in order to
# solve the DNS01 challenge.
# This group name should be **unique**, hence using your own company's domain
# here is recommended.
groupName: cert-manager.webhook.transip

# Number of webhook pods to run. The webhook is stateless; a single replica is
# sufficient for correctness (cert-manager retries challenges).
replicaCount: 1

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

image:
  repository: quanby.azurecr.io/cert-manager-webhook-transip
  # Empty tag tracks Chart.appVersion (bumped by CI on release), so the default
  # image always matches the chart version. Override only to pin a specific tag.
  tag: ""
  pullPolicy: IfNotPresent
  # Name of an imagePullSecret for pulling the image from a private registry.
  # Leave empty for public/anonymous pulls.
  privateRegistrySecretName: ""

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
