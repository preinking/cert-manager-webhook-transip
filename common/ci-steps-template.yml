steps:

- checkout: self
  fetchDepth: 0
  persistCredentials: true
  displayName: 'Checkout Code'

- task: gitversion/setup@3.0.0
  displayName: 'Install GitVersion'
  inputs:
    versionSpec: '5.x'

- task: gitversion/execute@3.0.0
  displayName: 'Calculate Version'

- script: |
    echo "##[group]Build Information"
    echo "Version: $(GitVersion.MajorMinorPatch)"
    echo "Image: $(registryServerName)/$(imageName):$(GitVersion.MajorMinorPatch)"
    echo "Branch: $(Build.SourceBranch)"
    echo "##[endgroup]"
  displayName: 'Display Build Info'

- script: |
    docker build \
      --tag $(registryServerName)/$(imageName):$(GitVersion.MajorMinorPatch) \
      --tag $(registryServerName)/$(imageName):latest \
      .
  displayName: 'Build Docker Image'

- script: |
    docker run --rm \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -v $(Agent.TempDirectory):/tmp \
      ghcr.io/aquasecurity/trivy:0.69.3 image \
      --exit-code 1 \
      --severity HIGH,CRITICAL \
      --scanners vuln,misconfig,secret \
      --ignore-unfixed \
      --format table \
      $(registryServerName)/$(imageName):$(GitVersion.MajorMinorPatch)
  displayName: 'Security Scan with Trivy'

- script: |
    echo $(registryPassword) | docker login $(registryServerName) -u $(registryLogin) --password-stdin
  displayName: 'Docker Login - ACR'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- script: |
    docker push $(registryServerName)/$(imageName):$(GitVersion.MajorMinorPatch)
    docker push $(registryServerName)/$(imageName):latest
  displayName: 'Push Docker Image'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- script: |
    git config user.email "no-reply@quanby.nl"
    git config user.name "CI Bot"
    if git tag -l "v$(GitVersion.MajorMinorPatch)" | grep -q .; then
      echo "Tag v$(GitVersion.MajorMinorPatch) already exists, skipping..."
    else
      git tag -a "v$(GitVersion.MajorMinorPatch)" -m "Release $(GitVersion.MajorMinorPatch) [skip ci]"
      git push origin "v$(GitVersion.MajorMinorPatch)"
    fi
  displayName: 'Create Git Tag'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- task: HelmInstaller@1
  displayName: 'Install Helm'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))
  inputs:
    helmVersionToInstall: $(helmVersion)

- script: |
    echo "$(registryPassword)" | helm registry login $(registryServerName) \
      --username $(registryLogin) \
      --password-stdin
  displayName: 'Helm Registry Login'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- script: |
    sed -i "s/^version: .*/version: $(GitVersion.MajorMinorPatch)/" charts/$(projectName)/Chart.yaml
    sed -i "s/^appVersion: .*/appVersion: \"$(GitVersion.MajorMinorPatch)\"/" charts/$(projectName)/Chart.yaml
    if ! git diff --quiet charts/$(projectName)/Chart.yaml; then
      git add charts/$(projectName)/Chart.yaml
      git commit -m "Update Chart version to $(GitVersion.MajorMinorPatch) [skip ci]"
      git push origin HEAD:master
    fi
  displayName: 'Update Chart Version'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- script: |
    helm package \
      --version $(GitVersion.MajorMinorPatch) \
      --app-version $(GitVersion.MajorMinorPatch) \
      charts/$(projectName)
  displayName: 'Package Helm Chart'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- script: |
    helm push $(projectName)-$(GitVersion.MajorMinorPatch).tgz \
      oci://$(registryName).azurecr.io/helm
    mkdir -p $(Build.ArtifactStagingDirectory)
    echo "{\"helmChartVersion\": \"$(GitVersion.MajorMinorPatch)\"}" > $(Build.ArtifactStagingDirectory)/variables.json
  displayName: 'Push Helm Chart'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))

- publish: $(Build.ArtifactStagingDirectory)
  artifact: build-artifact
  displayName: 'Publish Build Artifacts'
  condition: and(succeeded(), eq(variables['build.sourceBranch'], 'refs/heads/master'))
